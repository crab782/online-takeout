spring:
  datasource:
    url: jdbc:mysql://localhost:3306/front_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.front.entity

# 自定义配置
front:
  jwt:
    secret: your-secret-key
    expire: 86400

  sms:
    access-key-id: your-access-key
    access-key-secret: your-access-secret
    sign-name: your-sign-name
    template-code: your-template-code

  upload:
    path: /upload
    max-size: 10485760

  order:
    timeout: 30 # 订单超时时间（分钟）

  payment:
    min-amount: 0.01 # 最小支付金额
    max-amount: 10000.00 # 最大支付金额





spring:
  datasource:
    url: jdbc:mysql://localhost:3306/backend_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.backend.entity

# 自定义配置
backend:
  jwt:
    secret: your-secret-key
    expire: 86400

  upload:
    path: /upload
    max-size: 10485760

  order:
    timeout: 30 # 订单超时时间（分钟）

  withdrawal:
    min-amount: 100.00 # 最小提现金额
    max-amount: 50000.00 # 最大提现金额
    fee-rate: 0.001 # 提现手续费率